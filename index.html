<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Objectifs Quotidiens</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #111;
  color: #ddd;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── LOGIN ── */
#login {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 260px;
  padding: 28px;
  background: #1a1a1a;
  border-radius: 12px;
  border: 1px solid #252525;
}
#login h1 { font-size: 18px; font-weight: 600; text-align: center; color: #eee; margin-bottom: 4px; }
#login input {
  padding: 9px 12px;
  background: #222;
  border: 1px solid #2e2e2e;
  border-radius: 6px;
  color: #ddd;
  font-size: 13px;
  outline: none;
  width: 100%;
}
#login input:focus { border-color: #4a9eff; }
#login-err { font-size: 12px; color: #f55; text-align: center; display: none; }
#login button {
  padding: 9px;
  background: #4a9eff;
  border: none;
  border-radius: 6px;
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}
#login button:hover { background: #3a8eef; }

/* ── APP ── */
#app {
  display: none;
  flex-direction: column;
  width: 100vw;
  height: 100vh;
  padding: 14px 16px;
  gap: 10px;
}

/* Header */
#hdr { display: flex; align-items: center; justify-content: space-between; flex: 0 0 auto; }
#hdr-title { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.02em; }
#hdr-logout { font-size: 12px; color: #555; background: none; border: none; cursor: pointer; }
#hdr-logout:hover { color: #f55; }
.btn-hdr {
  font-size: 11px; padding: 3px 9px;
  background: #222; border: 1px solid #2e2e2e; border-radius: 5px;
  color: #888; cursor: pointer;
}
.btn-hdr:hover { background: #2a2a2a; color: #ccc; }

/* Date bar */
#datebar {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 0 0 auto;
  background: #1a1a1a;
  border: 1px solid #222;
  border-radius: 8px;
  padding: 7px 12px;
}
#date-disp { flex: 1; font-size: 13px; color: #ccc; font-weight: 500; }
.btn-nav {
  width: 26px; height: 26px;
  background: #222;
  border: 1px solid #2e2e2e;
  border-radius: 5px;
  color: #aaa;
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.btn-nav:hover { background: #2a2a2a; color: #ddd; }
.btn-today {
  font-size: 11px;
  padding: 3px 8px;
  background: #1a3050;
  border: none;
  border-radius: 20px;
  color: #4a9eff;
  cursor: pointer;
  font-weight: 500;
}
.btn-today:hover { background: #1e3a60; }

/* Main content */
#main { display: flex; gap: 12px; flex: 1; min-height: 0; }

/* Panels */
.panel {
  background: #1a1a1a;
  border: 1px solid #222;
  border-radius: 10px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow: hidden;
}
.panel-lbl {
  font-size: 11px;
  font-weight: 600;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ── LEFT PANEL ── */
#left { flex: 0 0 310px; }

#left-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex: 0 0 auto;
}
.btn-add-folder {
  font-size: 12px;
  padding: 3px 8px;
  background: #222;
  border: 1px solid #2e2e2e;
  border-radius: 5px;
  color: #666;
  cursor: pointer;
}
.btn-add-folder:hover { color: #aaa; background: #2a2a2a; }

#obj-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 0;
}
#obj-list::-webkit-scrollbar { width: 3px; }
#obj-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

/* Folder sections */
.folder-section {
  display: flex;
  flex-direction: column;
  gap: 3px;
  border-radius: 6px;
  border: 1.5px dashed transparent;
  padding: 3px;
  transition: border-color 0.15s, background 0.15s;
}
.folder-section.drag-over {
  border-color: #4a9eff;
  background: #131d2a;
}
.unfoldered-zone {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 3px;
  border-radius: 6px;
  border: 1.5px dashed transparent;
  transition: border-color 0.15s, background 0.15s;
}
.unfoldered-zone.drag-over { border-color: #4a9eff; background: #131d2a; }
.folder-header {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 6px 4px 2px;
  border-radius: 5px;
}
.folder-icon { font-size: 12px; }
.folder-name {
  flex: 1;
  font-size: 10px;
  font-weight: 700;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.07em;
}
/* Sub-folder visual distinction */
.folder-section.subfolder { border-left: 2px solid #2a2a2a; padding-left: 4px; }
.folder-section.subfolder > .folder-header { background: #161616; border-radius: 0 5px 5px 0; }
.folder-section.subfolder .folder-name { color: #4a4a4a; font-style: italic; font-size: 9px; }
.folder-section.subfolder .folder-icon { opacity: 0.6; font-size: 11px; }
/* Obj view toggle */
#obj-view-toggle {
  display: flex;
  background: #1e1e1e;
  border: 1px solid #2a2a2a;
  border-radius: 5px;
  padding: 2px;
  gap: 2px;
}
#obj-view-toggle .btn-view { padding: 2px 8px; font-size: 11px; }
.btn-toggle {
  background: none;
  border: none;
  color: #444;
  cursor: pointer;
  font-size: 9px;
  padding: 0 3px;
  line-height: 1;
  flex: 0 0 auto;
  transition: color 0.15s;
}
.btn-toggle:hover { color: #aaa; }
.btn-folder-add {
  background: none;
  border: none;
  color: #3a3a3a;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  padding: 0 3px;
  line-height: 1;
}
.btn-folder-add:hover { color: #4a9eff; }
.btn-folder-del {
  background: none;
  border: none;
  color: #3a3a3a;
  cursor: pointer;
  font-size: 13px;
  padding: 0 2px;
  line-height: 1;
}
.btn-folder-del:hover { color: #f55; }

.folder-objs {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding-left: 6px;
}
.folder-empty {
  font-size: 11px;
  color: #333;
  padding: 5px 8px;
  font-style: italic;
  border-radius: 4px;
  border: 1px dashed #252525;
  text-align: center;
}

.obj-row {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #212121;
  border-radius: 6px;
  padding: 7px 8px;
  flex: 0 0 auto;
  cursor: default;
}
.obj-row.dragging { opacity: 0.4; }
.drag-handle {
  color: #333;
  font-size: 13px;
  cursor: grab;
  flex: 0 0 auto;
  line-height: 1;
  user-select: none;
}
.drag-handle:hover { color: #555; }
.obj-name { flex: 1; font-size: 12px; color: #ccc; }
.obj-streak { font-size: 11px; font-weight: 700; color: #e06a00; flex: 0 0 auto; white-space: nowrap; }
.obj-cnt { font-size: 11px; font-variant-numeric: tabular-nums; color: #555; min-width: 36px; text-align: right; flex: 0 0 auto; }
.obj-cnt.done { color: #4caf50; }
.btn-inc, .btn-dec {
  width: 24px; height: 24px;
  background: #2a2a2a;
  border: 1px solid #333;
  border-radius: 4px;
  color: #999;
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
  flex: 0 0 auto;
}
.btn-inc:hover, .btn-dec:hover { background: #333; color: #ddd; }
.btn-edit {
  width: 20px; height: 20px;
  background: transparent;
  border: none;
  color: #3a3a3a;
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex: 0 0 auto;
}
.btn-edit:hover { color: #4a9eff; }
.btn-del {
  width: 20px; height: 20px;
  background: transparent;
  border: none;
  color: #3a3a3a;
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex: 0 0 auto;
}
.btn-del:hover { color: #f55; }

#add-form { display: flex; gap: 5px; flex: 0 0 auto; }
#add-form input {
  padding: 6px 9px;
  background: #222;
  border: 1px solid #2e2e2e;
  border-radius: 5px;
  color: #ddd;
  font-size: 12px;
  outline: none;
}
#add-form input:focus { border-color: #4a9eff; }
#inp-name { flex: 1; }
#inp-target { width: 52px; }
#btn-add {
  padding: 6px 12px;
  background: #4a9eff;
  border: none;
  border-radius: 5px;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  flex: 0 0 auto;
}
#btn-add:hover { background: #3a8eef; }

/* ── RIGHT PANEL: CALENDAR ── */
#right { flex: 1; }

#cal-hdr { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
#cal-period-lbl { flex: 1; text-align: center; font-size: 14px; font-weight: 500; color: #ddd; }

#view-toggle {
  display: flex;
  background: #222;
  border: 1px solid #2e2e2e;
  border-radius: 6px;
  padding: 2px;
  gap: 2px;
  flex: 0 0 auto;
}
.btn-view {
  padding: 3px 10px;
  border: none;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  background: transparent;
  color: #555;
}
.btn-view.active { background: #333; color: #ddd; }
.btn-view:hover:not(.active) { color: #aaa; }

#cal-wk {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  flex: 0 0 auto;
}
.wk-lbl {
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  color: #444;
  text-transform: uppercase;
  padding: 2px 0;
}

#cal-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-auto-rows: 1fr;
  gap: 4px;
  flex: 1;
  min-height: 0;
}

/* White calendar cells — shared base */
.cal-cell {
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 5px 7px;
  background: #f8f8f8;
  color: #333;
  user-select: none;
  overflow: hidden;
  gap: 2px;
  min-height: 0;
}
.cal-cell.empty { background: transparent; }
.cal-cell.today { outline: 2px solid #4a9eff; outline-offset: -2px; }
.cal-cell.green { background: #e8f5e9; color: #2a7a2a; }
.cal-cell.green.today { outline-color: #2e7d32; }
.cal-cell.yellow { background: #fff8e1; color: #8a6000; }
.cal-cell.yellow.today { outline-color: #f0a000; }
.cal-cell.past { background: #efefef; color: #aaa; }
.cal-cell.future { background: #f8f8f8; color: #ccc; }

/* Month view — compact text */
.cal-day-num { font-size: 10px; font-weight: 700; line-height: 1.2; flex: 0 0 auto; }
.cal-obj-item {
  font-size: 8px; font-weight: 400; line-height: 1.35;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 100%; flex: 0 0 auto; color: #aaa;
}
.cal-cell.green .cal-obj-item { color: #5aaf5a; }
.cal-cell.yellow .cal-obj-item { color: #b8960b; }
.cal-cell.past .cal-obj-item { color: #ccc; }
.cal-obj-item.done { text-decoration: line-through; color: inherit; opacity: 0.75; }

/* Week view — two-column scrollable */
.cal-cell.week-cell { padding: 6px 6px 4px; gap: 5px; align-items: stretch; }
.week-day-hdr {
  display: flex;
  align-items: baseline;
  gap: 5px;
  flex: 0 0 auto;
  padding-bottom: 5px;
  border-bottom: 1px solid rgba(0,0,0,0.09);
}
.week-day-name { font-size: 10px; font-weight: 700; text-transform: uppercase; opacity: 0.55; letter-spacing: 0.06em; }
.week-day-num { font-size: 16px; font-weight: 800; line-height: 1; }

.week-cols {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  gap: 0;
}
.week-cols::-webkit-scrollbar { width: 3px; }
.week-cols::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

.week-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 2px 4px;
  min-width: 0;
  overflow: hidden;
}
.week-col-sep {
  width: 1px;
  background: rgba(0,0,0,0.1);
  flex: 0 0 auto;
  align-self: stretch;
  margin: 0 2px;
}
.week-col-hdr {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  opacity: 0.45;
  padding: 1px 2px 3px;
  flex: 0 0 auto;
}
.week-folder-lbl {
  font-size: 8px;
  font-weight: 700;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 3px 2px 1px;
  border-bottom: 1px solid rgba(0,0,0,0.07);
  margin-top: 2px;
  flex: 0 0 auto;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cal-cell.green .week-folder-lbl { color: #4caf50; border-color: rgba(76,175,80,0.2); }
.cal-cell.yellow .week-folder-lbl { color: #b8960b; border-color: rgba(184,150,11,0.2); }

.week-obj {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 5px;
  border-radius: 4px;
  background: rgba(0,0,0,0.04);
  flex: 0 0 auto;
  overflow: hidden;
}
.week-obj.done { background: rgba(0,0,0,0.06); }
.week-check { font-size: 11px; flex: 0 0 auto; color: #4caf50; }
.cal-cell.green .week-check { color: #2a7a2a; }
.week-obj-name {
  flex: 1;
  font-size: 12px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.2;
}
.week-obj.done .week-obj-name { text-decoration: line-through; opacity: 0.5; }
.week-streak { font-size: 11px; font-weight: 700; color: #e06a00; flex: 0 0 auto; white-space: nowrap; }
.week-empty-col { font-size: 10px; color: #ccc; padding: 4px 2px; font-style: italic; }

/* Month view — two-column mini layout */
.cal-month-body {
  display: flex;
  flex: 1;
  gap: 2px;
  min-height: 0;
  overflow: hidden;
  width: 100%;
}
.cal-month-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 0;
  overflow: hidden;
}

#legend { display: flex; gap: 12px; flex: 0 0 auto; }

/* ── MOBILE ── */
@media (max-width: 700px) {
  #app { padding: 10px; gap: 8px; }
  #main { flex-direction: column; }
  #left { flex: 0 0 auto; max-height: 45vh; }
  #right { flex: 1; min-height: 0; }
  #datebar { padding: 6px 10px; }
  #date-disp { font-size: 12px; }
  #cal-days { grid-auto-rows: auto; }
  .cal-cell { min-height: 52px; }
  .cal-cell.week-cell { min-height: 120px; }
  .week-cols { overflow-y: auto; }
  #legend { gap: 8px; }
  .leg-item { font-size: 10px; }
  #obj-view-toggle { display: none; }
  .btn-add-folder { font-size: 11px; padding: 3px 7px; }

  /* Week view: 1 day full-width stacked */
  #cal-days.week-view {
    grid-template-columns: 1fr;
    overflow-y: auto;
    gap: 8px;
  }
  #cal-days.week-view .cal-cell.week-cell {
    min-height: auto;
    padding: 12px 14px;
    gap: 8px;
  }
  #cal-days.week-view .week-day-hdr {
    padding-bottom: 8px;
  }
  #cal-days.week-view .week-day-name {
    font-size: 12px;
  }
  #cal-days.week-view .week-day-num {
    font-size: 22px;
  }
  #cal-days.week-view .week-cols {
    flex-direction: column;
    overflow-y: visible;
    gap: 6px;
  }
  #cal-days.week-view .week-col-sep {
    width: 100%;
    height: 1px;
    align-self: auto;
    margin: 2px 0;
  }
  #cal-days.week-view .week-col-hdr {
    font-size: 11px;
    padding-bottom: 4px;
  }
  #cal-days.week-view .week-obj {
    padding: 7px 10px;
  }
  #cal-days.week-view .week-obj-name {
    font-size: 14px;
    white-space: normal;
  }
  #cal-days.week-view .week-folder-lbl {
    font-size: 10px;
  }
  #cal-days.week-view .week-streak {
    font-size: 13px;
  }
}
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }
.leg-dot.green { background: #4caf50; }
.leg-dot.yellow { background: #e0a820; }
.leg-dot.past { background: #ccc; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h1>Objectifs</h1>
  <input id="inp-user" type="text" placeholder="Utilisateur" autocomplete="off">
  <input id="inp-pass" type="password" placeholder="Mot de passe">
  <div id="login-err">Identifiants incorrects</div>
  <button onclick="login()">Connexion</button>
</div>

<!-- APP -->
<div id="app">
  <div id="hdr">
    <span id="hdr-title">Objectifs Quotidiens</span>
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="btn-hdr" onclick="shareMobile()" title="Transférer vers mobile">📲 Mobile</button>
      <button id="hdr-logout" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div id="datebar">
    <button class="btn-nav" onclick="shiftDay(-1)">&#8592;</button>
    <span id="date-disp"></span>
    <button class="btn-nav" onclick="shiftDay(1)">&#8594;</button>
    <button class="btn-today" onclick="goToday()">Aujourd'hui</button>
  </div>

  <div id="main">
    <div class="panel" id="left">
      <div id="left-top">
        <div class="panel-lbl">Objectifs du jour</div>
        <div id="obj-view-toggle">
          <button class="btn-view active" id="btn-view-folders" onclick="setObjView('folders')" title="Vue dossiers">📁</button>
          <button class="btn-view" id="btn-view-flat" onclick="setObjView('flat')" title="Vue plate">☰</button>
        </div>
        <button class="btn-add-folder" onclick="addFolder()">+ Dossier</button>
      </div>
      <div id="obj-list"></div>
      <div id="add-form">
        <input id="inp-name" type="text" placeholder="Nom de l'objectif…">
        <input id="inp-target" type="number" placeholder="Cible" min="1" value="1">
        <button id="btn-add" onclick="addObj()">+</button>
      </div>
    </div>

    <div class="panel" id="right">
      <div id="cal-hdr">
        <button class="btn-nav" onclick="shiftCal(-1)">&#8592;</button>
        <span id="cal-period-lbl"></span>
        <button class="btn-nav" onclick="shiftCal(1)">&#8594;</button>
        <div id="view-toggle">
          <button class="btn-view active" id="btn-mois" onclick="setView('month')">Mois</button>
          <button class="btn-view" id="btn-sem" onclick="setView('week')">Semaine</button>
        </div>
      </div>
      <div id="cal-wk"></div>
      <div id="cal-days"></div>
      <div id="legend">
        <div class="leg-item"><div class="leg-dot green"></div>Tous complétés</div>
        <div class="leg-item"><div class="leg-dot yellow"></div>Partiel</div>
        <div class="leg-item"><div class="leg-dot past"></div>Manqué</div>
      </div>
    </div>
  </div>
</div>

<script>
const AUTH = { user: 'admin', pass: 'admin' };

let selectedDate = new Date();
let calYear = selectedDate.getFullYear();
let calMonth = selectedDate.getMonth();
let calView = 'month';
let calWeekStart = getMonday(new Date());
let objectives = [];
let folders = [];
let data = {};
let dragObjId = null;
let dragFolderId = null;
let touchActive = false;
let touchGhost = null;
let touchDragSourceEl = null;
let objView = 'folders';
const collapsedFolders = new Set();

const FR_DAYS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const FR_MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const WK_NAMES = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

function dk(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

function getMonday(d) {
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(d);
  mon.setDate(d.getDate() + diff);
  return mon;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function save() {
  localStorage.setItem('obj', JSON.stringify(objectives));
  localStorage.setItem('dat', JSON.stringify(data));
  localStorage.setItem('folders', JSON.stringify(folders));
}

function load() {
  objectives = JSON.parse(localStorage.getItem('obj') || '[]');
  data = JSON.parse(localStorage.getItem('dat') || '{}');
  folders = JSON.parse(localStorage.getItem('folders') || '[]');
  // migrate: ensure parentId exists on old folders
  folders.forEach(f => { if (f.parentId === undefined) f.parentId = null; });
}

// ── AUTH ──
function login() {
  const u = document.getElementById('inp-user').value;
  const p = document.getElementById('inp-pass').value;
  if (u === AUTH.user && p === AUTH.pass) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    load();
    tryAutoImport();
    selectedDate = new Date();
    calYear = selectedDate.getFullYear();
    calMonth = selectedDate.getMonth();
    calWeekStart = getMonday(selectedDate);
    render();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

function logout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  document.getElementById('inp-user').value = '';
  document.getElementById('inp-pass').value = '';
  document.getElementById('login-err').style.display = 'none';
}

document.getElementById('inp-pass').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('inp-user').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-pass').focus(); });

// ── DATE ──
function shiftDay(d) {
  const nd = new Date(selectedDate);
  nd.setDate(nd.getDate() + d);
  selectedDate = nd;
  render();
}

function goToday() {
  selectedDate = new Date();
  calYear = selectedDate.getFullYear();
  calMonth = selectedDate.getMonth();
  calWeekStart = getMonday(selectedDate);
  render();
}

function renderDateBar() {
  const d = selectedDate;
  document.getElementById('date-disp').textContent =
    FR_DAYS[d.getDay()] + ' ' + d.getDate() + ' ' + FR_MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}

// ── STREAK ──
function getStreakAt(objId, asOf) {
  const obj = objectives.find(o => o.id === objId);
  if (!obj) return 0;
  let streak = 0;
  const d = new Date(asOf);
  while (true) {
    const count = (data[dk(d)] || {})[objId] || 0;
    if (count >= obj.target) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
}

function getStreak(objId) { return getStreakAt(objId, selectedDate); }

// ── FOLDERS ──
function addFolder(parentId = null) {
  const name = prompt('Nom du dossier :');
  if (!name || !name.trim()) return;
  folders.push({ id: Date.now().toString(), name: name.trim(), parentId: parentId || null });
  save();
  renderObjs();
}

function delFolder(id) {
  const folder = folders.find(f => f.id === id);
  const parentId = folder ? folder.parentId : null;
  if (!confirm('Supprimer ce dossier ? Le contenu sera déplacé au niveau parent.')) return;
  // move objectives up
  objectives.forEach(o => { if (o.folderId === id) o.folderId = parentId; });
  // move sub-folders up
  folders.forEach(f => { if (f.parentId === id) f.parentId = parentId; });
  folders = folders.filter(f => f.id !== id);
  save();
  renderObjs();
}

function setObjView(v) {
  objView = v;
  document.getElementById('btn-view-folders').classList.toggle('active', v === 'folders');
  document.getElementById('btn-view-flat').classList.toggle('active', v === 'flat');
  renderObjs();
}

function toggleFolder(id) {
  if (collapsedFolders.has(id)) collapsedFolders.delete(id);
  else collapsedFolders.add(id);
  renderObjs();
}

function isDescendantOf(nodeId, ancestorId) {
  if (!nodeId || !ancestorId) return false;
  const node = folders.find(f => f.id === nodeId);
  if (!node || !node.parentId) return false;
  if (node.parentId === ancestorId) return true;
  return isDescendantOf(node.parentId, ancestorId);
}

function dropToFolder(targetFolderId) {
  if (dragFolderId !== null) {
    if (dragFolderId !== targetFolderId && !isDescendantOf(targetFolderId, dragFolderId)) {
      const f = folders.find(x => x.id === dragFolderId);
      if (f) f.parentId = targetFolderId || null;
    }
    dragFolderId = null;
    save(); renderObjs();
  } else if (dragObjId !== null) {
    const obj = objectives.find(o => o.id === dragObjId);
    if (obj) obj.folderId = targetFolderId || null;
    dragObjId = null;
    save(); renderObjs();
  }
}

// ── OBJECTIVES ──
function makeObjRow(o, dd) {
  const c = dd[o.id] || 0;
  const done = c >= o.target;
  const streak = getStreak(o.id);
  const row = document.createElement('div');
  row.className = 'obj-row';
  row.draggable = true;
  row.dataset.id = o.id;

  row.addEventListener('dragstart', e => {
    dragObjId = o.id;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => row.classList.add('dragging'), 0);
  });
  row.addEventListener('dragend', () => row.classList.remove('dragging'));

  row.innerHTML =
    `<span class="drag-handle">⠿</span>` +
    `<span class="obj-name">${esc(o.name)}</span>` +
    (streak > 0 ? `<span class="obj-streak">🔥${streak}</span>` : '') +
    `<span class="obj-cnt${done ? ' done' : ''}">${c}&thinsp;/&thinsp;${o.target}</span>` +
    `<button class="btn-dec" onclick="dec('${o.id}')">−</button>` +
    `<button class="btn-inc" onclick="inc('${o.id}')">+</button>` +
    `<button class="btn-edit" onclick="editObj('${o.id}')">✎</button>` +
    `<button class="btn-del" onclick="delObj('${o.id}')">×</button>`;
  addTouchDragToHandle(row.querySelector('.drag-handle'), row, () => { dragObjId = o.id; dragFolderId = null; });
  return row;
}

function makeFolderNode(folderId, label, icon, depth, canDelete, dd) {
  const collapsed = collapsedFolders.has(folderId === null ? '__root__' : folderId);
  const colKey = folderId === null ? '__root__' : folderId;

  const section = document.createElement('div');
  section.className = depth > 0 ? 'folder-section subfolder' : 'folder-section';
  if (depth > 0) section.style.marginLeft = (depth * 12) + 'px';

  section.dataset.folderId = folderId === null ? '' : folderId;
  section.addEventListener('dragover', e => { e.preventDefault(); section.classList.add('drag-over'); });
  section.addEventListener('dragleave', e => { if (!section.contains(e.relatedTarget)) section.classList.remove('drag-over'); });
  section.addEventListener('drop', e => { e.preventDefault(); section.classList.remove('drag-over'); dropToFolder(folderId); });

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'folder-header';
  hdr.innerHTML =
    (folderId !== null ? `<span class="drag-handle folder-drag-handle">⠿</span>` : '<span style="width:6px"></span>') +
    `<button class="btn-toggle" onclick="toggleFolder('${colKey}')">${collapsed ? '▶' : '▼'}</button>` +
    `<span class="folder-icon">${icon}</span>` +
    `<span class="folder-name">${esc(label)}</span>` +
    (folderId !== null ? `<button class="btn-folder-add" onclick="addFolder('${folderId}')" title="Sous-dossier">+</button>` : '') +
    (canDelete ? `<button class="btn-folder-del" onclick="delFolder('${folderId}')">×</button>` : '');

  if (folderId !== null) {
    hdr.draggable = true;
    hdr.addEventListener('dragstart', e => {
      dragFolderId = folderId;
      dragObjId = null;
      e.dataTransfer.effectAllowed = 'move';
      e.stopPropagation();
      setTimeout(() => { hdr.style.opacity = '0.45'; }, 0);
    });
    hdr.addEventListener('dragend', () => { dragFolderId = null; hdr.style.opacity = ''; });
    const fHandle = hdr.querySelector('.folder-drag-handle');
    if (fHandle) addTouchDragToHandle(fHandle, hdr, () => { dragFolderId = folderId; dragObjId = null; });
  }
  section.appendChild(hdr);

  if (!collapsed) {
    const folderObjs = folderId === null
      ? objectives.filter(o => !o.folderId)
      : objectives.filter(o => o.folderId === folderId);
    const subFolders = folders.filter(f => f.parentId === folderId);

    const objsEl = document.createElement('div');
    objsEl.className = 'folder-objs';
    if (folderObjs.length === 0 && subFolders.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'folder-empty';
      empty.textContent = 'Glisser un objectif ici';
      objsEl.appendChild(empty);
    } else {
      folderObjs.forEach(o => objsEl.appendChild(makeObjRow(o, dd)));
    }
    section.appendChild(objsEl);

    // Only named folders have sub-folders; null/"Sans dossier" does not
    if (folderId !== null) {
      subFolders.forEach(sf => section.appendChild(makeFolderNode(sf.id, sf.name, '📁', depth + 1, true, dd)));
    }
  }

  return section;
}

function renderObjs() {
  const el = document.getElementById('obj-list');
  const key = dk(selectedDate);
  const dd = data[key] || {};
  el.innerHTML = '';

  if (objectives.length === 0 && folders.length === 0) {
    el.innerHTML = '<div style="font-size:12px;color:#3a3a3a;text-align:center;padding:24px 0;">Aucun objectif.<br>Ajoutez-en un !</div>';
    return;
  }

  if (objView === 'flat') {
    // Flat view: all objectives as simple rows, no folder structure
    if (objectives.length === 0) {
      el.innerHTML = '<div style="font-size:12px;color:#3a3a3a;text-align:center;padding:24px 0;">Aucun objectif.</div>';
      return;
    }
    objectives.forEach(o => el.appendChild(makeObjRow(o, dd)));
  } else if (folders.length === 0) {
    // No named folders — show everything in "Sans dossier"
    el.appendChild(makeFolderNode(null, 'Sans dossier', '📄', 0, false, dd));
  } else {
    // Named folders exist: unfoldered objectives as plain drop zone (no header)
    const unfoldered = objectives.filter(o => !o.folderId);
    if (unfoldered.length > 0) {
      const zone = document.createElement('div');
      zone.className = 'unfoldered-zone';
      zone.dataset.folderId = '';
      zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
      zone.addEventListener('dragleave', e => { if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over'); });
      zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); dropToFolder(null); });
      unfoldered.forEach(o => zone.appendChild(makeObjRow(o, dd)));
      el.appendChild(zone);
    }
    // Root folders only — children render recursively
    folders.filter(f => !f.parentId).forEach(f =>
      el.appendChild(makeFolderNode(f.id, f.name, '📁', 0, true, dd))
    );
  }
}

function inc(id) {
  const key = dk(selectedDate);
  if (!data[key]) data[key] = {};
  data[key][id] = (data[key][id] || 0) + 1;
  save(); render();
}

function dec(id) {
  const key = dk(selectedDate);
  if (!data[key]) data[key] = {};
  data[key][id] = Math.max(0, (data[key][id] || 0) - 1);
  save(); render();
}

function addObj() {
  const n = document.getElementById('inp-name').value.trim();
  const t = Math.max(1, parseInt(document.getElementById('inp-target').value) || 1);
  if (!n) return;
  objectives.push({ id: Date.now().toString(), name: n, target: t, folderId: null });
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-target').value = '1';
  save(); render();
}

function editObj(id) {
  const obj = objectives.find(o => o.id === id);
  if (!obj) return;
  const name = prompt('Nom :', obj.name);
  if (name === null) return;
  if (!name.trim()) return;
  const target = parseInt(prompt('Cible :', obj.target));
  if (isNaN(target) || target < 1) return;
  obj.name = name.trim();
  obj.target = target;
  save(); render();
}

function delObj(id) {
  if (!confirm('Supprimer cet objectif ?')) return;
  objectives = objectives.filter(o => o.id !== id);
  Object.values(data).forEach(d => delete d[id]);
  save(); render();
}

document.getElementById('inp-name').addEventListener('keydown', e => { if (e.key === 'Enter') addObj(); });

// Drag-scroll: auto-scroll #obj-list when dragging near edges
(function() {
  let scrollTimer = null;
  const stopScroll = () => { if (scrollTimer) { clearInterval(scrollTimer); scrollTimer = null; } };

  document.addEventListener('dragover', e => {
    const list = document.getElementById('obj-list');
    if (!list) return;
    const rect = list.getBoundingClientRect();
    const zone = 52;
    stopScroll();
    if (e.clientY >= rect.top && e.clientY <= rect.bottom) {
      if (e.clientY < rect.top + zone) {
        scrollTimer = setInterval(() => { list.scrollTop -= 10; }, 20);
      } else if (e.clientY > rect.bottom - zone) {
        scrollTimer = setInterval(() => { list.scrollTop += 10; }, 20);
      }
    }
  });
  document.addEventListener('dragend', stopScroll);
  document.addEventListener('drop', stopScroll);
})();

// ── TOUCH DRAG & DROP ──
function clearTouchDrag() {
  if (touchGhost) { touchGhost.remove(); touchGhost = null; }
  if (touchDragSourceEl) { touchDragSourceEl.style.opacity = ''; touchDragSourceEl = null; }
  document.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));
  touchActive = false;
}

function addTouchDragToHandle(handle, dragEl, onStart) {
  handle.addEventListener('touchstart', e => {
    e.stopPropagation();
    onStart();
    touchActive = true;
    touchDragSourceEl = dragEl;
    dragEl.style.opacity = '0.35';
    const rect = dragEl.getBoundingClientRect();
    const touch = e.touches[0];
    touchGhost = dragEl.cloneNode(true);
    touchGhost.style.cssText = [
      'position:fixed', 'pointer-events:none', 'z-index:9999',
      `width:${rect.width}px`, `left:${rect.left}px`, `top:${rect.top}px`,
      'opacity:0.8', 'box-shadow:0 4px 16px rgba(0,0,0,0.6)', 'border-radius:6px'
    ].join(';');
    touchGhost._ox = touch.clientX - rect.left;
    touchGhost._oy = touch.clientY - rect.top;
    document.body.appendChild(touchGhost);
  }, { passive: true });
}

document.addEventListener('touchmove', e => {
  if (!touchActive || !touchGhost) return;
  e.preventDefault();
  const touch = e.touches[0];
  touchGhost.style.left = (touch.clientX - touchGhost._ox) + 'px';
  touchGhost.style.top  = (touch.clientY - touchGhost._oy) + 'px';
  touchGhost.style.visibility = 'hidden';
  const under = document.elementFromPoint(touch.clientX, touch.clientY);
  touchGhost.style.visibility = '';
  document.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));
  const zone = under && under.closest('[data-folder-id]');
  if (zone) zone.classList.add('drag-over');
}, { passive: false });

document.addEventListener('touchend', e => {
  if (!touchActive) return;
  const touch = e.changedTouches[0];
  if (touchGhost) touchGhost.style.visibility = 'hidden';
  const under = document.elementFromPoint(touch.clientX, touch.clientY);
  if (touchGhost) touchGhost.style.visibility = '';
  const zone = under && under.closest('[data-folder-id]');
  if (zone) {
    const fId = zone.dataset.folderId === '' ? null : zone.dataset.folderId;
    dropToFolder(fId);
  } else {
    dragObjId = null;
    dragFolderId = null;
  }
  clearTouchDrag();
}, { passive: true });

// ── CALENDAR ──
function dayStatus(ds) {
  const today = dk(new Date());
  if (ds > today) return 'future';
  if (!objectives.length) return 'none';
  const dd = data[ds] || {};
  let met = 0;
  objectives.forEach(o => { if ((dd[o.id] || 0) >= o.target) met++; });
  if (met === objectives.length) return 'green';
  if (met > 0) return 'yellow';
  return 'past';
}

function cellBaseClass(ds) {
  const st = dayStatus(ds);
  const todayStr = dk(new Date());
  let cls = 'cal-cell';
  if (st !== 'none') cls += ' ' + st;
  if (ds === todayStr) cls += ' today';
  return cls;
}

function getFolderGroups(dd, ds) {
  const todayStr = dk(new Date());
  const isFuture = ds > todayStr;
  const groups = [];

  function walk(folderId, folderName) {
    const objs = folderId === null
      ? objectives.filter(o => !o.folderId)
      : objectives.filter(o => o.folderId === folderId);
    if (objs.length > 0) {
      groups.push({
        name: folderName,
        items: objs.map(o => {
          const c = (dd[o.id] || 0);
          const done = !isFuture && c >= o.target;
          const streak = isFuture ? 0 : getStreakAt(o.id, new Date(ds));
          return { obj: o, done, streak };
        })
      });
    }
    folders.filter(f => f.parentId === folderId).forEach(f => walk(f.id, f.name));
  }

  walk(null, null);
  folders.filter(f => !f.parentId).forEach(f => walk(f.id, f.name));
  return groups;
}

function buildMonthCellHTML(ds, dayNum) {
  const dd = data[ds] || {};
  const todayStr = dk(new Date());
  const isFuture = ds > todayStr;
  let doneHTML = '';
  let todoHTML = '';

  objectives.forEach(o => {
    const done = !isFuture && (dd[o.id] || 0) >= o.target;
    const item = `<span class="cal-obj-item${done ? ' done' : ''}">${done ? '✓ ' : ''}${esc(o.name)}</span>`;
    if (done) doneHTML += item;
    else todoHTML += item;
  });

  const body = objectives.length > 0
    ? `<div class="cal-month-body"><div class="cal-month-col">${doneHTML}</div><div class="cal-month-col">${todoHTML}</div></div>`
    : '';

  return `<div class="${cellBaseClass(ds)}"><span class="cal-day-num">${dayNum}</span>${body}</div>`;
}

function buildWeekCellHTML(ds, dayNum, dayOfWeek) {
  const dd = data[ds] || {};
  const groups = getFolderGroups(dd, ds);

  let doneHTML = '';
  let todoHTML = '';

  groups.forEach(g => {
    const doneItems = g.items.filter(x => x.done);
    const todoItems = g.items.filter(x => !x.done);

    if (doneItems.length > 0) {
      if (g.name) doneHTML += `<div class="week-folder-lbl">📁 ${esc(g.name)}</div>`;
      doneItems.forEach(x => {
        doneHTML +=
          `<div class="week-obj done">` +
          `<span class="week-check">✓</span>` +
          `<span class="week-obj-name">${esc(x.obj.name)}</span>` +
          (x.streak > 0 ? `<span class="week-streak">🔥${x.streak}</span>` : '') +
          `</div>`;
      });
    }

    if (todoItems.length > 0) {
      if (g.name) todoHTML += `<div class="week-folder-lbl">📁 ${esc(g.name)}</div>`;
      todoItems.forEach(x => {
        todoHTML +=
          `<div class="week-obj">` +
          `<span class="week-obj-name">${esc(x.obj.name)}</span>` +
          (x.streak > 0 ? `<span class="week-streak">🔥${x.streak}</span>` : '') +
          `</div>`;
      });
    }
  });

  const inner =
    `<div class="week-day-hdr">
      <span class="week-day-name">${WK_NAMES[dayOfWeek]}</span>
      <span class="week-day-num">${dayNum}</span>
    </div>
    <div class="week-cols">
      <div class="week-col">
        <div class="week-col-hdr">Complété</div>
        ${doneHTML || '<div class="week-empty-col">—</div>'}
      </div>
      <div class="week-col-sep"></div>
      <div class="week-col">
        <div class="week-col-hdr">À faire</div>
        ${todoHTML || '<div class="week-empty-col">—</div>'}
      </div>
    </div>`;

  return `<div class="${cellBaseClass(ds)} week-cell">${inner}</div>`;
}

function setView(v) {
  calView = v;
  if (v === 'week') calWeekStart = getMonday(selectedDate);
  document.getElementById('btn-mois').classList.toggle('active', v === 'month');
  document.getElementById('btn-sem').classList.toggle('active', v === 'week');
  renderCal();
}

function shiftCal(dir) {
  if (calView === 'month') {
    calMonth += dir;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    if (calMonth > 11) { calMonth = 0; calYear++; }
  } else {
    calWeekStart = new Date(calWeekStart);
    calWeekStart.setDate(calWeekStart.getDate() + dir * 7);
  }
  renderCal();
}

function renderCal() {
  const wkEl = document.getElementById('cal-wk');
  const daysEl = document.getElementById('cal-days');
  const isMobile = window.innerWidth <= 700;
  daysEl.classList.toggle('week-view', calView === 'week');
  wkEl.style.display = (calView === 'week' && isMobile) ? 'none' : '';
  wkEl.innerHTML = WK_NAMES.map(w => `<div class="wk-lbl">${w}</div>`).join('');

  if (calView === 'month') {
    document.getElementById('cal-period-lbl').textContent = FR_MONTHS[calMonth] + ' ' + calYear;

    const first = new Date(calYear, calMonth, 1);
    let offset = first.getDay();
    offset = offset === 0 ? 6 : offset - 1;
    const total = new Date(calYear, calMonth + 1, 0).getDate();

    let html = '';
    for (let i = 0; i < offset; i++) html += '<div class="cal-cell empty"></div>';
    for (let d = 1; d <= total; d++) {
      const ds = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      html += buildMonthCellHTML(ds, d);
    }
    daysEl.innerHTML = html;

  } else {
    const weekEnd = new Date(calWeekStart);
    weekEnd.setDate(weekEnd.getDate() + 6);
    document.getElementById('cal-period-lbl').textContent =
      calWeekStart.getDate() + ' ' + FR_MONTHS[calWeekStart.getMonth()] +
      ' – ' + weekEnd.getDate() + ' ' + FR_MONTHS[weekEnd.getMonth()] + ' ' + weekEnd.getFullYear();

    let html = '';
    for (let i = 0; i < 7; i++) {
      const d = new Date(calWeekStart);
      d.setDate(d.getDate() + i);
      html += buildWeekCellHTML(dk(d), d.getDate(), i);
    }
    daysEl.innerHTML = html;
  }
}

function shareMobile() {
  const payload = JSON.stringify({ obj: objectives, dat: data, folders });
  const encoded = btoa(unescape(encodeURIComponent(payload)));
  const url = location.origin + location.pathname + '#d=' + encoded;
  navigator.clipboard.writeText(url).then(() => {
    alert('✅ Lien copié !\n\nOuvre ce lien sur mobile et connecte-toi — les données s\'importent automatiquement.');
  }).catch(() => {
    prompt('Copie ce lien et ouvre-le sur mobile :', url);
  });
}

function tryAutoImport() {
  const hash = location.hash;
  if (!hash.startsWith('#d=')) return;
  try {
    const encoded = hash.slice(3);
    const raw = decodeURIComponent(escape(atob(encoded)));
    const parsed = JSON.parse(raw);
    if (parsed.obj) objectives = parsed.obj;
    if (parsed.dat) data = parsed.dat;
    if (parsed.folders) folders = parsed.folders;
    folders.forEach(f => { if (f.parentId === undefined) f.parentId = null; });
    save();
    history.replaceState(null, '', location.pathname);
  } catch(e) { /* ignore bad hash */ }
}

function render() {
  renderDateBar();
  renderObjs();
  renderCal();
}
